name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'
  GO_VERSION: '1.23'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Run Go tests
        working-directory: ./sidecar
        run: |
          go mod tidy
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: sidecar/coverage.html

      - name: Install frontend dependencies
        working-directory: ./src
        run: npm ci

      - name: Run frontend tests
        working-directory: ./src
        run: npm test -- --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/coverage/

      - name: Run E2E tests
        working-directory: ./src
        run: |
          npm run build
          npm run test:e2e

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            sidecar_target: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_target: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sidecar_target: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_target: windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ./src
        run: npm ci

      - name: Build sidecar
        run: |
          cd sidecar
          go mod tidy
          ${{ matrix.os == 'windows-latest' && 'set' || 'export' }} GOOS=${{ contains(matrix.sidecar_target, 'windows') && 'windows' || (contains(matrix.sidecar_target, 'darwin') && 'darwin' || 'linux') }}
          ${{ matrix.os == 'windows-latest' && 'set' || 'export' }} GOARCH=${{ contains(matrix.sidecar_target, 'arm64') && 'arm64' || 'amd64' }}
          go build -ldflags="-s -w" -trimpath -o ../src/src-tauri/binaries/grpc-sidecar-${{ matrix.sidecar_target }}${{ contains(matrix.sidecar_target, 'windows') && '.exe' || '' }} .

      - name: Build Tauri app
        working-directory: ./src
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-13'
        uses: actions/upload-artifact@v4
        with:
          name: gRPC-UI-macos-${{ matrix.sidecar_target }}
          path: |
            src/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gRPC-UI-linux-${{ matrix.sidecar_target }}
          path: |
            src/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gRPC-UI-windows-${{ matrix.sidecar_target }}
          path: |
            src/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
